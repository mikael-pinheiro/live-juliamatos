<div class="checkout-wrap">

    QUERO VER ELA AO VIVO 🔥
  </a>
</div>

<style>
  :root{
    --btn-green: #28a745; /* tom principal (pode trocar) */
    --btn-green-dark: #23923b;
    --btn-text: #ffffff;
  }

  /* container centralizado */
  .checkout-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    padding: 30px 10px;
  }

  /* botão estilizado */
  .checkout-btn{
    display:inline-block;
    background: linear-gradient(180deg, var(--btn-green) 0%, var(--btn-green-dark) 100%);
    color: var(--btn-text);
    text-decoration: none;
    font-weight: 800;
    letter-spacing: 0.6px;
    padding: 16px 28px;
    border-radius: 12px;
    font-size: 18px;
    box-shadow: 0 8px 20px rgba(40,167,69,0.18), 0 2px 6px rgba(0,0,0,0.08) inset;
    transform: translateZ(0);
    transition: transform 160ms ease, box-shadow 160ms ease;
    /* animação pulsante suave */
    animation: pulse-weak 2.6s ease-in-out infinite;
    border: none;
    cursor: pointer;
    text-align: center;
  }

  .checkout-btn:hover,
  .checkout-btn:focus{
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 14px 30px rgba(40,167,69,0.22);
    outline: none;
  }

  .checkout-btn:active{
    transform: translateY(-1px) scale(0.995);
    box-shadow: 0 8px 18px rgba(40,167,69,0.18);
  }

  /* acessibilidade: foco visível */
  .checkout-btn:focus{
    box-shadow: 0 0 0 5px rgba(40,167,69,0.14), 0 12px 28px rgba(0,0,0,0.08);
  }

  @keyframes pulse-weak{
    0%{
      transform: scale(1) translateZ(0);
      box-shadow: 0 8px 20px rgba(40,167,69,0.18);
    }
    50%{
      transform: scale(1.03) translateZ(0);
      box-shadow: 0 18px 36px rgba(40,167,69,0.16);
    }
    100%{
      transform: scale(1) translateZ(0);
      box-shadow: 0 8px 20px rgba(40,167,69,0.18);
    }
  }

  /* reduz animação se usuário preferir movimento reduzido */
  @media (prefers-reduced-motion: reduce){
    .checkout-btn{
      animation: none;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
  }

  /* responsivo: texto menor em telas pequenas */
  @media (max-width:420px){
    .checkout-btn{ padding: 14px 20px; font-size:16px; border-radius:10px; }
  }
</style>

     

        <p class="text-muted mt-2 small"></p>
